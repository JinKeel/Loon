const html = `
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON可视化</title>
    <style>
        :root {
            --font-size: 13px;
            --box-bg: #151515;
            --line-display: flex;
            --toggle-color: #0a84ff;
            --body-bg: #f5f5f7;
            --text-main: #1d1d1f;
            --input-bg: #ffffff;
            --input-border: #d2d2d7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --body-bg: #1c1c1e;
                --text-main: #f5f5f7;
                --input-bg: #2c2c2e;
                --input-border: #3a3a3c;
            }
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            position: relative;
        }

        h2 {
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
            font-size: 24px;
        }

        #gear-btn {
            position: absolute;
            top: 15px;
            right: 0;
            cursor: pointer;
            font-size: 22px;
            z-index: 10;
        }

        #settings-panel {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e7;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            #settings-panel {
                background: rgba(44, 44, 46, 0.9);
                border-color: #3a3a3c;
            }
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input[type=range] {
            width: 120px;
            accent-color: #007aff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #34c759;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-main);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin: 18px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .output-box {
            width: 100%;
            min-height: 400px;
            border-radius: 12px;
            background-color: var(--box-bg);
            color: #d4d4d4;
            padding: 14px;
            box-sizing: border-box;
            font-family: "SF Mono", Menlo, monospace;
            font-size: var(--font-size);
            line-height: 1.6;
            overflow-x: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
            outline: none;
        }

        .row-container {
            display: flex;
            align-items: flex-start;
        }

        .line-num {
            display: var(--line-display);
            min-width: 20px;
            margin-right: 5px;
            text-align: right;
            color: #555;
            font-size: 10px;
            user-select: none;
            flex-shrink: 0;
        }

        .json-content {
            margin-left: 15px;
            border-left: 1px dashed #444;
            padding-left: 8px;
            flex-grow: 1;
        }

        .toggle-btn {
            cursor: pointer;
            color: var(--toggle-color);
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            width: 16px;
            text-align: center;
            vertical-align: middle;
            margin-right: 2px;
            user-select: none;
        }

        .json-key {
            color: #9cdcfe;
            font-weight: normal;
        }

        .json-string {
            color: #ce9178;
            font-weight: normal;
        }

        .json-number {
            color: #b5cea8;
            font-weight: normal;
        }

        .json-bracket {
            color: #ffd700;
            font-weight: normal;
        }

        .search-highlight {
            background-color: #ffd60a;
            color: #000;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="gear-btn" onclick="document.getElementById('settings-panel').style.display = document.getElementById('settings-panel').style.display === 'block' ? 'none' : 'block'">⚙️</div>
        <h2>JSON可视化</h2>
        <div id="settings-panel">
            <div class="setting-item">文字大小: <input type="range" id="sizeRange" min="10" max="20" value="13" oninput="saveAndApply()"></div>
            <div class="setting-item">层级按钮: <input type="color" id="colorPicker" value="#0a84ff" oninput="saveAndApply()"></div>
            <div class="setting-item">背景颜色: <select id="bgSelect" onchange="saveAndApply()">
                <option value="#151515">深黑</option>
                <option value="#000000">纯黑</option>
                <option value="#282c34">蓝灰</option>
            </select></div>
            <div class="setting-item">显示行号: <label class="switch"><input type="checkbox" id="lineCheck" checked onchange="saveAndApply()"><span class="slider"></span></label></div>
        </div>
        <textarea id="jsonInput" placeholder="请输入 JSON..."></textarea>
        <div class="btn-group">
            <button style="background:#D54A4B;color:white" onclick="handleClear()">清空</button>
            <button style="background:#5856d6;color:white" onclick="handleVisualize()">可视化</button>
            <button style="background:#0E7CD5;color:white" onclick="handleSearch()">查找</button>
        </div>
        <div id="jsonOutput" class="output-box" contenteditable="true"></div>
    </div>

    <script defer>
        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('jsonSettings') || '{}');
            document.getElementById('sizeRange').value = s.size || 13;
            document.getElementById('colorPicker').value = s.color || '#0a84ff';
            document.getElementById('bgSelect').value = s.bg || '#151515';
            document.getElementById('lineCheck').checked = s.showLine !== false;
            applySettings();
        }

        function saveAndApply() {
            const s = {
                size: document.getElementById('sizeRange').value,
                color: document.getElementById('colorPicker').value,
                bg: document.getElementById('bgSelect').value,
                showLine: document.getElementById('lineCheck').checked
            };
            localStorage.setItem('jsonSettings', JSON.stringify(s));
            applySettings();
        }

        function applySettings() {
            const s = JSON.parse(localStorage.getItem('jsonSettings') || '{}');
            document.documentElement.style.setProperty('--font-size', (s.size || 13) + 'px');
            document.documentElement.style.setProperty('--toggle-color', s.color || '#0a84ff');
            document.documentElement.style.setProperty('--box-bg', s.bg || '#151515');
            document.documentElement.style.setProperty('--line-display', s.showLine !== false ? 'flex' : 'none');
        }

        var inputArea = document.getElementById('jsonInput');
        var outputArea = document.getElementById('jsonOutput');
        var rainbowColors = ['#ff453a', '#ffd60a', '#30d158', '#0a84ff', '#bf5af2'];
        var lineIdx = 0;

        function handleClear() {
            inputArea.value = '';
            outputArea.innerHTML = '';
            lineIdx = 0;
        }

        function handleVisualize() {
            lineIdx = 0;
            var rawText = inputArea.value.trim();
            if (!rawText) return;
            try {
                var parsedObj = JSON.parse(rawText);
                outputArea.innerHTML = renderValue(parsedObj, 0);
            } catch (e) {
                outputArea.innerHTML = '<div style="color:#ff453a">JSON 格式错误</div>';
            }
        }

        function renderValue(val, depth) {
            if (depth === undefined) depth = 0;
            if (val === null) return '<span style="color:#569cd6">null</span>';
            if (typeof val === 'string') return '<span class="json-string">"' + val + '"</span>';
            if (typeof val !== 'object') return '<span class="json-number">' + val + '</span>';
            
            var color = rainbowColors[depth % rainbowColors.length];
            var isArr = Array.isArray(val);
            var html = '<span class="toggle-btn">▼</span><span class="json-bracket">' + (isArr ? '[' : '{') + '</span>';
            html += '<div class="json-content" style="border-left-color: ' + color + '">';
            
            Object.keys(val).forEach((k, i, arr) => {
                lineIdx++;
                html += '<div class="row-container"><span class="line-num">' + lineIdx + '</span><div>' +
                    (isArr ? '' : '<span class="json-key">"' + k + '"</span>: ') +
                    renderValue(val[k], depth + 1) + (i < arr.length - 1 ? ',' : '') + '</div></div>';
            });
            
            lineIdx++;
            html += '</div><div class="row-container"><span class="line-num">' + lineIdx + '</span><span class="json-bracket">' + (isArr ? ']' : '}') + '</span></div>';
            return html;
        }

        function handleSearch() {
            var keyword = prompt("请输入关键词:");
            if (!keyword) return;
            document.querySelectorAll('.search-highlight').forEach(el => el.classList.remove('search-highlight'));
            var elements = document.querySelectorAll('.json-key, .json-string');
            for (var el of elements) {
                if (el.innerText.includes(keyword)) {
                    el.classList.add('search-highlight');
                    el.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                }
            }
        }

        outputArea.addEventListener('click', function(e) {
            if (e.target.classList.contains('toggle-btn')) {
                var contentDiv = e.target.parentElement.querySelector('.json-content');
                if (contentDiv) {
                    var isHidden = contentDiv.style.display === 'none';
                    contentDiv.style.display = isHidden ? 'block' : 'none';
                    e.target.innerText = isHidden ? '▼' : '▶';
                }
            }
        });

        loadSettings();
    </script>
</body>
</html>
`;

$done({
    response: {
        status: 200,
        headers: {
            "Content-Type": "text/html; charset=UTF-8"
        },
        body: html
    }
});
